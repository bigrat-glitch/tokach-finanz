<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viktor Tokach - Finanzberatung</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            background: radial-gradient(circle at top center, #1f1f1f 0%, #000000 100%);
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 50px 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile-section {
            text-align: center;
            margin-bottom: 45px;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 32px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        h2 {
            margin: 0;
            font-size: 13px;
            font-weight: 400;
            color: #888888;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        a.link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        @media (hover: hover) {
            a.link-btn:hover {
                background: #ffffff;
                color: #000000;
                transform: translateY(-4px);
                box-shadow: 0 8px 20px rgba(255, 255, 255, 0.15);
            }
        }

        a.link-btn:active {
            transform: scale(0.97);
        }

        .booking-section {
            margin-top: 45px;
            width: 100%;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .booking-text {
            margin-bottom: 24px;
            font-size: 15px;
            font-weight: 300;
            text-align: center;
            line-height: 1.6;
            color: #b0b0b0;
        }
    </style>
</head>
<body>

<main class="card">
    <div class="profile-section">
        <h1>Viktor Tokach</h1>
        <h2 id="profession">Finanzberatung</h2>
    </div>

    <div class="links-container">
        <a href="https://www.facebook.com/share/1D8KkNpkxX/?mibextid=wwXIfr" class="link-btn" target="_blank" rel="noopener noreferrer">Facebook</a>
        <a href="https://www.instagram.com/tokachvv?igsh=cm1jN2Y0YTFoMDJq&utm_source=qr" class="link-btn" target="_blank" rel="noopener noreferrer">Instagram</a>
        <a href="mailto:thetokach@gmail.com" class="link-btn">E-Mail</a>
    </div>

    <div class="booking-section">
        <div class="booking-text" id="booking-text">
            Sie können unter diesen Kontakten einen Termin vereinbaren:
        </div>

        <div class="links-container">
            <a href="https://t.me/tokachvv" class="link-btn" target="_blank" rel="noopener noreferrer">Telegram</a>
            <a href="https://wa.me/4915750686547" class="link-btn" target="_blank" rel="noopener noreferrer">WhatsApp</a>
        </div>
    </div>
</main>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const translations = {
            de: {
                profession: "Finanzberatung",
                bookingText: "Sie können unter diesen Kontakten einen Termin vereinbaren:"
            },
            uk: {
                profession: "Фінансовий консультант",
                bookingText: "Ви можете записатись на термін за цими контактами:"
            },
            ru: {
                profession: "Финансовый консультант",
                bookingText: "Вы можете записаться на прием по этим контактам:"
            },
            en: {
                profession: "Financial Advisor",
                bookingText: "You can book an appointment via the following contacts:"
            },
            pl: {
                profession: "Doradca finansowy",
                bookingText: "Możesz umówić się na spotkanie przez poniższe kontakty:"
            },
            tr: {
                profession: "Finansal Danışman",
                bookingText: "Aşağıdaki iletişim kanallarından randevu alabilirsiniz:"
            }
        };

        let userLang = (navigator.language || navigator.userLanguage).slice(0, 2).toLowerCase();

        if (!translations[userLang]) {
            userLang = 'de';
        }

        const professionElement = document.getElementById('profession');
        const bookingTextElement = document.getElementById('booking-text');

        if (professionElement && bookingTextElement) {
            professionElement.textContent = translations[userLang].profession;
            bookingTextElement.textContent = translations[userLang].bookingText;
        }

        document.documentElement.lang = userLang;
    });
</script>

</body>
</html>
